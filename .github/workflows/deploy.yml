name: Déploiement VPS (production)

# Se déclenche à chaque push sur main (ou manuellement depuis l'onglet Actions).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Un seul déploiement à la fois : on ne veut pas deux mises à jour simultanées.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Déployer sur le VPS Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Connexion SSH + déploiement
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"
            echo "==> Récupération du code depuis GitHub"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
